name: Build & Release Music Player

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Release Split)
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=MUSIXMATCH_API_KEY=${{ secrets.MUSIXMATCH_API_KEY }} \
            --dart-define=GENIUS_API_KEY=${{ secrets.GENIUS_API_KEY }} \
            --dart-define=GOOGLE_TRANSLATE_API_KEY=${{ secrets.GOOGLE_TRANSLATE_API_KEY }}

      - name: Build App Bundle (Release AAB)
        run: |
          flutter build appbundle --release \
            --dart-define=MUSIXMATCH_API_KEY=${{ secrets.MUSIXMATCH_API_KEY }} \
            --dart-define=GENIUS_API_KEY=${{ secrets.GENIUS_API_KEY }} \
            --dart-define=GOOGLE_TRANSLATE_API_KEY=${{ secrets.GOOGLE_TRANSLATE_API_KEY }}

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS (IPA)
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Pod Install
        run: |
          cd ios
          pod install

      - name: Build iOS App (No Codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=MUSIXMATCH_API_KEY=${{ secrets.MUSIXMATCH_API_KEY }} \
            --dart-define=GENIUS_API_KEY=${{ secrets.GENIUS_API_KEY }} \
            --dart-define=GOOGLE_TRANSLATE_API_KEY=${{ secrets.GOOGLE_TRANSLATE_API_KEY }}

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: build/ios/iphoneos/Runner.app

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web App
        run: |
          flutter build web --release \
            --dart-define=MUSIXMATCH_API_KEY=${{ secrets.MUSIXMATCH_API_KEY }} \
            --dart-define=GENIUS_API_KEY=${{ secrets.GENIUS_API_KEY }} \
            --dart-define=GOOGLE_TRANSLATE_API_KEY=${{ secrets.GOOGLE_TRANSLATE_API_KEY }}

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: build/web

  release:
    name: Auto Release on Tags
    needs: [build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Pemutar Musik & Lirik - Release ${{ github.ref_name }}
            
            ### Fitur Utama:
            - Pemutar Musik Imersif dengan Shuffle & Repeat
            - Equalizer & Sleep Timer
            - Pencarian Lirik Cerdas (Musixmatch, Genius, AZLyrics, Gemini)
            - Penerjemah Lirik Bahasa Indonesia (Toggle & Side-by-Side)
            - Manajemen Playlist Lokal & Favorit
            
            ### Changelog:
            Otomatis digenerate dari commit history.
          draft: false
          prerelease: false

      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/app-release.apk
          asset_name: PemutarMusik-Universal-Release.apk
          asset_content_type: application/vnd.android.package-archive
