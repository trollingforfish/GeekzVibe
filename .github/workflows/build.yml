name: Build & Release Android App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build-android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create .env configuration
        run: |
          touch .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

      - name: Build Debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    name: Auto Release on Tags
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android Artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-debug-apk
          path: release-artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## GeekzVibe - Release ${{ github.ref_name }}
            
            ### Fitur Utama:
            - Pemutar Musik Imersif dengan Shuffle & Repeat
            - Equalizer & Sleep Timer
            - Pencarian Lirik Cerdas (Musixmatch, Genius, AZLyrics, Gemini)
            - Penerjemah Lirik Bahasa Indonesia (Toggle & Side-by-Side)
            - Manajemen Playlist Lokal & Favorit
            - Autentikasi Terpisah dengan Login Dialog
            
            ### Unduh APK:
            Instal file APK di bawah ini langsung pada perangkat Android Anda.
          draft: false
          prerelease: false

      - name: Upload Release Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-artifacts/app-debug.apk
          asset_name: GeekzVibe-Debug-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive
